apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-app
  namespace: assignment3
  labels:
    app: chaos-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-app
  template:
    metadata:
      labels:
        app: chaos-app
    spec:
      containers:
        - name: chaos-app
          image: <your-dockerhub-username>/chaos-app:latest
          ports:
            - containerPort: 8000
          env:
            - name: OLLAMA_API_URL
              value: "http://ollama-service:11434/api/chat"
            - name: OLLAMA_HOST
              value: "http://ollama-service:11434"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: chaos-service
  namespace: assignment3
spec:
  type: NodePort
  selector:
    app: chaos-app
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30088
