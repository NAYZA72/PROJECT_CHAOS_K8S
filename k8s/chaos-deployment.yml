apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-web
  namespace: chaos
  labels:
    app: chaos-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-web
  template:
    metadata:
      labels:
        app: chaos-web
    spec:
      containers:
        - name: chaos-web
          image: nayza72/flask-api:latest
          ports:
            - containerPort: 5000
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: chaos-config
                  key: db_host
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql_user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql_password
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: chaos-config
                  key: db_name
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
